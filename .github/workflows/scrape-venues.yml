name: Weekly Venue Scrape

on:
  schedule:
    # Every Monday at 6am UTC (2am Toronto time)
    - cron: '0 6 * * 1'
  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit venues.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run venue scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/scrape-venues.js

      - name: Commit updated venues
