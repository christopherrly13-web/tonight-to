name: Weekly Venue Scrape

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6am UTC (2am Toronto)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run venue scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/scrape-venues.js

      - name: Commit updated venues.json
        run: |
          git config user.name "Tonight.TO Bot"
          git config user.email "bot@tonightto.ca"
          git add venues.json
          git diff --staged --quiet || git commit -m "Weekly venue update $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
