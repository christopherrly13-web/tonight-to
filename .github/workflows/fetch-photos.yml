name: Fetch Venue Photos

on:
  workflow_dispatch:

jobs:
  fetch-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test Places API
        run: node test-places.cjs
