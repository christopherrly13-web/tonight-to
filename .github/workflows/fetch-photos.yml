name: Fetch Venue Photos

on:
  workflow_dispatch:

jobs:
  fetch-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run photo fetcher
        run: node fetch-photos.cjs

      - name: Commit updated venues.json
        run: |
          git config user.name "Tonight.TO Bot"
          git config user.email "bot@tonightto.ca"
          git add venues.json
          git diff --staged --quiet || git commit -m "Add venue photos from Google Places $(date +'%Y-%m-%d')"
          git push
