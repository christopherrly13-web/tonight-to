<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:rgba(255,255,255,0.08);--text:#f0ede8;--muted:#888;--accent:#e8c547;--accent-dim:rgba(232,197,71,0.12);--green:#4caf7d;--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}
.header{padding:52px 20px 0}
.header-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px}
.logo{font-family:'DM Serif Display',serif;font-size:30px;color:var(--text);line-height:1}
.logo span{color:var(--accent)}
.tonight-badge{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:var(--accent-dim);color:var(--accent);padding:5px 10px;border-radius:20px;border:1px solid rgba(232,197,71,.2)}
.subhead{font-size:12px;color:var(--muted);margin-bottom:16px}
.filters{padding:0 20px 12px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.filters::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:7px 13px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill.active{background:var(--accent);color:#0f0f0f;border-color:var(--accent)}
.controls{padding:0 20px 12px;display:flex;gap:8px}
.sw{flex:1;position:relative}
.sw select{width:100%;appearance:none;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 28px 9px 11px;border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.sw::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px;pointer-events:none}
.count-bar{padding:0 20px 10px;display:flex;justify-content:space-between;align-items:center}
.count-text{font-size:12px;color:var(--muted)}
.now-lbl{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer}
.now-lbl input{accent-color:var(--accent)}
.cards{padding:0 20px 110px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;transition:transform .1s}
.card:active{transform:scale(.98)}
.card.live-card{border-color:rgba(76,175,125,.35)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:7px}
.card-name{font-size:15px;font-weight:600;color:var(--text);line-height:1.25}
.card-sub{font-size:11px;color:var(--muted);margin-top:3px}
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.b-hh{background:rgba(232,197,71,.15);color:#c9a832}
.b-trivia{background:rgba(100,160,255,.12);color:#7aabff}
.b-karaoke{background:rgba(240,100,160,.12);color:#f07ab8}
.b-openmic{background:rgba(100,220,160,.12);color:#5dd4a0}
.b-dj{background:rgba(180,100,255,.12);color:#c07aff}
.b-comedy{background:rgba(255,160,80,.12);color:#ffaa60}
.b-bingo{background:rgba(80,200,240,.12);color:#60d4f8}
.b-jazz{background:rgba(255,200,100,.12);color:#ffc864}
.b-livemusic{background:rgba(180,255,140,.12);color:#a0e870}
.b-drag{background:rgba(255,130,200,.12);color:#ff82c8}
.b-quiz{background:rgba(100,160,255,.12);color:#7aabff}
.detail{font-size:13px;color:#aaa;line-height:1.5;margin-bottom:11px}
.card-ftr{display:flex;justify-content:space-between;align-items:center}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted);margin-right:5px;vertical-align:middle;flex-shrink:0}
.dot.on{background:var(--green);box-shadow:0 0 5px rgba(76,175,125,.5)}
.time-wrap{display:flex;align-items:center;font-size:12px}
.time-txt{color:var(--muted)}
.time-txt.on{color:var(--green);font-weight:500}
.days-txt{font-size:11px;color:var(--muted)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty p{font-size:14px;line-height:1.6}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,15,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;transition:color .15s}
.nb.active{color:var(--accent)}
.ni{font-size:19px;line-height:1}
.ibanner{margin:0 20px 12px;background:var(--accent-dim);border:1px solid rgba(232,197,71,.2);border-radius:var(--radius-sm);padding:11px 13px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.itext{font-size:12px;color:var(--accent);line-height:1.4}
.ixbtn{color:var(--accent);font-size:17px;cursor:pointer;background:none;border:none;flex-shrink:0}
</style>
</head>

</div>

<div class="cards" id="cards"></div>

const ALL=[...HH,...EV];
const DKEYS=["sun","mon","tue","wed","thu","fri","sat"];
const DNAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DABB={mon:"Mon",tue:"Tue",wed:"Wed",thu:"Thu",fri:"Fri",sat:"Sat",sun:"Sun"};
const TLABEL={happyhour:"Happy hour",trivia:"Trivia",karaoke:"Karaoke",openmic:"Open mic",dj:"DJ night",comedy:"Comedy",bingo:"Bingo",livemusic:"Live music",jazz:"Jazz",drag:"Drag",quiz:"Quiz"};
const TBADGE={happyhour:"b-hh",trivia:"b-trivia",karaoke:"b-karaoke",openmic:"b-openmic",dj:"b-dj",comedy:"b-comedy",bingo:"b-bingo",livemusic:"b-livemusic",jazz:"b-jazz",drag:"b-drag",quiz:"b-quiz"};

const now=new Date();
const todayIdx=now.getDay();
const todayKey=DKEYS[todayIdx];
const curHour=now.getHours()+now.getMinutes()/60;
document.getElementById("today-lbl").textContent=DNAMES[todayIdx];
document.getElementById("day-sel").value=todayKey;

let activeType="all",activeNav="all";

function setType(el){
  document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  activeType=el.dataset.t;
  render();
}
function setNav(t,el){
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  activeNav=t;
  activeType="all";
  document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));
  document.querySelector("[data-t='all']").classList.add("active");
  render();
}
function isNow(v){
  const d=document.getElementById("day-sel").value;
  if(d!==todayKey)return false;
  return v.days.includes(todayKey)&&curHour>=v.start&&curHour<v.end;
}
function fmt(h){const h2=h>=24?h-24:h;const ap=h2>=12?"pm":"am";const hr=h2>12?h2-12:(h2===0?12:h2);return hr+ap;}

function render(){
  const day=document.getElementById("day-sel").value;
  const hood=document.getElementById("hood-sel").value;
  const nowOnly=document.getElementById("now-chk").checked;
  let items=ALL.filter(v=>{
    if(!v.days.includes(day))return false;
    if(hood!=="all"&&v.hood!==hood)return false;
    if(activeNav==="happyhour"&&v.type!=="happyhour")return false;
    if(activeNav==="event"&&v.type==="happyhour")return false;
    if(activeType!=="all"&&v.type!==activeType)return false;
    if(nowOnly&&!isNow(v))return false;
    return true;
  });
  items.sort((a,b)=>isNow(b)-isNow(a));
  document.getElementById("ct").textContent=items.length+" spot"+(items.length!==1?"s":"")+" found";
  document.getElementById("count-sub").textContent=items.length+" spot"+(items.length!==1?"s":"")+" · "+DNAMES[DKEYS.indexOf(day)];
  const c=document.getElementById("cards");
  if(!items.length){c.innerHTML=`<div class="empty"><p>Nothing matches your filters.<br>Try a different day or neighbourhood.</p></div>`;return;}
  c.innerHTML=items.map(v=>{
    const live=isNow(v);
    return`<div class="card ${live?"live-card":""}">
      <div class="card-top">
        <div><div class="card-name">${v.name}</div><div class="card-sub">${v.hood} · ${v.addr}</div></div>
        <span class="badge ${TBADGE[v.type]||"b-hh"}">${TLABEL[v.type]||v.type}</span>
      </div>
      <div class="detail">${v.detail}</div>
      <div class="card-ftr">
        <div class="time-wrap"><span class="dot ${live?"on":""}"></span><span class="time-txt ${live?"on":""}">${live?"Happening now":fmt(v.start)+"–"+fmt(v.end)}</span></div>
        <span class="days-txt">${v.days.map(d=>DABB[d]).join(" · ")}</span>
      </div>
    </div>`;
  }).join("");
}
function dismissBanner(){document.getElementById("ibanner").style.display="none";localStorage.setItem("bnr","1");}
if(!localStorage.getItem("bnr")&&/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)){setTimeout(()=>{document.getElementById("ibanner").style.display="flex";},1500);}
if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
render();
</script>
