<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tonight TO">
<meta name="description" content="Find happy hours and events in Toronto tonight">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Tonight TO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: rgba(255,255,255,0.08);
  --text: #f0ede8;
  --muted: #888;
  --accent: #e8c547;
  --accent-dim: rgba(232,197,71,0.12);
  --green: #4caf7d;
  --green-dim: rgba(76,175,125,0.12);
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

/* Header */
.header { padding: 56px 20px 0; }
.header-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
.logo { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); line-height: 1; }
.logo span { color: var(--accent); }
.tonight-badge { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; background: var(--accent-dim); color: var(--accent); padding: 5px 10px; border-radius: 20px; border: 1px solid rgba(232,197,71,0.2); }

/* Filters */
.filters { padding: 0 20px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
.filters::-webkit-scrollbar { display: none; }
.filter-pill { flex-shrink: 0; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.filter-pill.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); }

/* Search & selects */
.controls { padding: 0 20px 16px; display: flex; gap: 8px; }
.select-wrap { flex: 1; position: relative; }
.select-wrap select { width: 100%; appearance: none; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 30px 10px 12px; border-radius: var(--radius-sm); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.select-wrap::after { content: '▾'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 12px; pointer-events: none; }

/* Count bar */
.count-bar { padding: 0 20px 12px; display: flex; justify-content: space-between; align-items: center; }
.count-text { font-size: 12px; color: var(--muted); }
.now-only { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; }
.now-only input { accent-color: var(--accent); }

/* Cards */
.cards { padding: 0 20px 100px; display: flex; flex-direction: column; gap: 10px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: transform 0.1s; }
.card:active { transform: scale(0.98); }
.card.now { border-color: rgba(76,175,125,0.3); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.card-name { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.2; }
.card-hood { font-size: 12px; color: var(--muted); margin-top: 3px; }
.badge { font-size: 11px; font-weight: 500; padding: 4px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.badge-hh    { background: rgba(232,197,71,0.15); color: #c9a832; }
.badge-trivia  { background: rgba(100,160,255,0.12); color: #7aabff; }
.badge-karaoke { background: rgba(240,100,160,0.12); color: #f07ab8; }
.badge-openmic { background: rgba(100,220,160,0.12); color: #5dd4a0; }
.badge-dj      { background: rgba(180,100,255,0.12); color: #c07aff; }
.badge-comedy  { background: rgba(255,160,80,0.12); color: #ffaa60; }
.badge-bingo   { background: rgba(80,200,240,0.12); color: #60d4f8; }
.card-detail { font-size: 13px; color: #b0ad a8; line-height: 1.5; margin-bottom: 12px; color: #aaa; }
.card-footer { display: flex; justify-content: space-between; align-items: center; }
.time-info { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.live { background: var(--green); box-shadow: 0 0 6px rgba(76,175,125,0.5); }
.time-text { color: var(--muted); }
.time-text.live { color: var(--green); font-weight: 500; }
.days-text { font-size: 11px; color: var(--muted); }

/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,15,15,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px; cursor: pointer; border: none; background: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500; transition: color 0.15s; }
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 20px; line-height: 1; }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* Install banner */
.install-banner { margin: 0 20px 16px; background: var(--accent-dim); border: 1px solid rgba(232,197,71,0.2); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; }
.install-text { font-size: 12px; color: var(--accent); line-height: 1.4; }
.install-close { color: var(--accent); font-size: 18px; cursor: pointer; padding: 0 4px; background: none; border: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Tonight<span>.</span>TO</div>
    <div class="tonight-badge" id="today-label">Thursday</div>
  </div>
</div>

<div id="install-banner" class="install-banner" style="display:none">
  <div class="install-text">Add to your home screen for quick access — tap Share then "Add to Home Screen"</div>
  <button class="install-close" onclick="dismissBanner()">✕</button>
</div>

<div class="filters" id="type-filters">
  <div class="filter-pill active" data-type="all" onclick="setType(this)">All</div>
  <div class="filter-pill" data-type="happyhour" onclick="setType(this)">Happy hour</div>
  <div class="filter-pill" data-type="trivia" onclick="setType(this)">Trivia</div>
  <div class="filter-pill" data-type="karaoke" onclick="setType(this)">Karaoke</div>
  <div class="filter-pill" data-type="openmic" onclick="setType(this)">Open mic</div>
  <div class="filter-pill" data-type="comedy" onclick="setType(this)">Comedy</div>
  <div class="filter-pill" data-type="dj" onclick="setType(this)">DJ night</div>
  <div class="filter-pill" data-type="bingo" onclick="setType(this)">Bingo</div>
</div>

<div class="controls">
  <div class="select-wrap">
    <select id="hood-select" onchange="render()">
      <option value="all">All neighbourhoods</option>
      <option value="King West">King West</option>
      <option value="Queen West">Queen West</option>
      <option value="Kensington">Kensington Market</option>
      <option value="Distillery">Distillery District</option>
      <option value="Ossington">Ossington</option>
      <option value="Yorkville">Yorkville</option>
      <option value="Liberty Village">Liberty Village</option>
      <option value="Little Italy">Little Italy</option>
      <option value="Leslieville">Leslieville</option>
      <option value="Financial">Financial District</option>
    </select>
  </div>
  <div class="select-wrap">
    <select id="day-select" onchange="render()">
      <option value="mon">Monday</option>
      <option value="tue">Tuesday</option>
      <option value="wed">Wednesday</option>
      <option value="thu">Thursday</option>
      <option value="fri">Friday</option>
      <option value="sat">Saturday</option>
      <option value="sun">Sunday</option>
    </select>
  </div>
</div>

<div class="count-bar">
  <span class="count-text" id="count-text">Loading...</span>
  <label class="now-only"><input type="checkbox" id="now-only" onchange="render()"> Happening now</label>
</div>

<div class="cards" id="cards"></div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="setNav('all',this)">
    <span class="nav-icon">◈</span>All
  </button>
  <button class="nav-btn" onclick="setNav('happyhour',this)">
    <span class="nav-icon">◇</span>Happy hour
  </button>
  <button class="nav-btn" onclick="setNav('event',this)">
    <span class="nav-icon">◉</span>Events
  </button>
</div>

<script>
const HH = [
  {name:"Bar Raval",hood:"Little Italy",type:"happyhour",dealType:"both",days:["mon","tue","wed","thu","fri"],start:15,end:18,detail:"$6 pintxos, $7 vermouth & natural wine, $5 beer",addr:"505 College St"},
  {name:"BarChef",hood:"Queen West",type:"happyhour",dealType:"drinks",days:["mon","tue","wed","thu"],start:17,end:19,detail:"$10 cocktails (reg $18–22), $7 wine, $6 beer",addr:"472 Queen St W"},
  {name:"The Citizen",hood:"Financial",type:"happyhour",dealType:"both",days:["mon","tue","wed","thu","fri"],start:16,end:18,detail:"$6 draft, $7 house wine, $9 apps",addr:"147 King St W"},
  {name:"Reposado",hood:"Ossington",type:"happyhour",dealType:"drinks",days:["mon","tue","wed","thu","fri"],start:17,end:19,detail:"$8 margaritas, $6 Mexican beer, 2-for-1 shots",addr:"136 Ossington Ave"},
  {name:"Canoe",hood:"Financial",type:"happyhour",dealType:"both",days:["mon","tue","wed","thu","fri"],start:16,end:18,detail:"$10 wine & beer, $12 cocktails, $14 bar snacks",addr:"66 Wellington St W"},
  {name:"The Drake Hotel",hood:"Queen West",type:"happyhour",dealType:"both",days:["mon","tue","wed","thu","fri"],start:17,end:19,detail:"$6 drafts, $8 house wine, $10 bar bites",addr:"1150 Queen St W"},
  {name:"Baro",hood:"King West",type:"happyhour",dealType:"both",days:["mon","tue","wed","thu","fri"],start:16,end:18,detail:"$8 cocktails, $6 beer & wine, half-price tacos",addr:"485 King St W"},
  {name:"El Catrin",hood:"Distillery",type:"happyhour",dealType:"both",days:["mon","tue","wed","thu","fri"],start:15,end:18,detail:"$7 margaritas, $6 Modelo, half-price guac & queso",addr:"18 Tank House Ln"},
  {name:"Pai",hood:"Financial",type:"happyhour",dealType:"both",days:["mon","tue","wed","thu","fri"],start:17,end:18,detail:"$7 Chang beer, $8 cocktails, $9 bar snacks",addr:"18 Duncan St"},
  {name:"Superpoint",hood:"Kensington",type:"happyhour",dealType:"drinks",days:["mon","tue","wed","thu","fri","sat","sun"],start:15,end:18,detail:"$5 Peroni, $6 natural wine, $7 spritz",addr:"214A Augusta Ave"},
  {name:"Bellwoods Brewery",hood:"Queen West",type:"happyhour",dealType:"drinks",days:["mon","tue","wed","thu"],start:15,end:18,detail:"$6 pints on select house beers",addr:"124 Ossington Ave"},
  {name:"Archive Bar",hood:"Yorkville",type:"happyhour",dealType:"both",days:["mon","tue","wed","thu","fri"],start:16,end:18,detail:"$7 wine & craft beer, $10 cocktails, $12 small plates",addr:"909 Bay St"},
  {name:"Avling",hood:"Leslieville",type:"happyhour",dealType:"both",days:["tue","wed","thu","fri"],start:17,end:19,detail:"$6 house lager, $8 natural wine, $10 bar bites",addr:"1042 Queen St E"},
  {name:"La Palma",hood:"Little Italy",type:"happyhour",dealType:"both",days:["mon","tue","wed","thu","fri"],start:17,end:18,detail:"$8 Aperol spritz, $7 wine, $10 pizza slices",addr:"849 Dundas St W"},
  {name:"Liberal Commons",hood:"Liberty Village",type:"happyhour",dealType:"both",days:["mon","tue","wed","thu","fri"],start:16,end:18,detail:"$5 domestic draft, $7 wine, $9 apps",addr:"25 Liberty St"},
  {name:"Richmond Station",hood:"Financial",type:"happyhour",dealType:"both",days:["mon","tue","wed","thu","fri"],start:16,end:18,detail:"$7 draft, $9 wine, $12 cocktails, $10 bar snacks",addr:"1 Richmond St W"},
];

const EV = [
  {name:"The Communist's Daughter",hood:"Ossington",type:"openmic",days:["mon"],start:20,end:23,detail:"Open mic night, free entry. Sign up from 8pm. Rotating acoustic sets.",addr:"1149 Dundas St W"},
  {name:"The Dakota Tavern",hood:"Little Italy",type:"openmic",days:["mon"],start:21,end:24,detail:"Bluegrass open mic every Monday. No cover. Bring your instrument.",addr:"249 Ossington Ave"},
  {name:"The Handlebar",hood:"Kensington",type:"trivia",days:["tue"],start:19,end:21,detail:"Pub trivia by Quiz Me Quick. Free to play, prizes for top 3.",addr:"159 Augusta Ave"},
  {name:"The Garrison",hood:"Kensington",type:"openmic",days:["tue"],start:20,end:23,detail:"Tuesday open mic, all genres welcome. Free entry. 10 slots per night.",addr:"1197 Dundas St W"},
  {name:"The 3030",hood:"Leslieville",type:"trivia",days:["tue"],start:19,end:21,detail:"Pub trivia Tuesdays. Cash prizes. $5 entry per person.",addr:"3030 Dundas St W"},
  {name:"The Bovine Sex Club",hood:"Queen West",type:"openmic",days:["wed"],start:21,end:24,detail:"Open mic Wednesdays, rock/punk/experimental. $5 cover.",addr:"542 Queen St W"},
  {name:"The Piston",hood:"Ossington",type:"trivia",days:["wed"],start:20,end:22,detail:"Wednesday trivia, bar prizes. Teams of up to 6. Free entry.",addr:"937 Bloor St W"},
  {name:"Habits Gastropub",hood:"Kensington",type:"trivia",days:["wed"],start:20,end:22,detail:"Weekly pub quiz, mixed categories. $2 off drinks during trivia.",addr:"148 College St"},
  {name:"The Rivoli",hood:"Queen West",type:"comedy",days:["wed"],start:20,end:22,detail:"Stand-up showcase Wednesdays. $8 cover. Rotating local comics.",addr:"334 Queen St W"},
  {name:"The Gladstone Hotel",hood:"Queen West",type:"bingo",days:["wed"],start:19,end:21,detail:"Drag bingo Wednesdays. $15 entry, prizes & cocktails. Sells out fast.",addr:"1214 Queen St W"},
  {name:"The Cameron House",hood:"Queen West",type:"openmic",days:["mon","tue"],start:21,end:24,detail:"Nightly live music & open mic. No cover. Legendary Toronto venue.",addr:"408 Queen St W"},
  {name:"Bar Neon",hood:"Kensington",type:"karaoke",days:["thu","fri","sat"],start:21,end:26,detail:"Private karaoke rooms. Walk-ins welcome. $15/person/hr.",addr:"230 Augusta Ave"},
  {name:"Karaoke Lounge 99",hood:"Financial",type:"karaoke",days:["wed","thu","fri","sat","sun"],start:19,end:26,detail:"Private rooms, 50,000+ songs. $12–18/person/hr by day.",addr:"99 Spadina Ave"},
  {name:"The Rec Room",hood:"Financial",type:"karaoke",days:["fri","sat"],start:20,end:26,detail:"Open karaoke stage Fri & Sat nights. Free entry. Slots fill fast.",addr:"255 Bremner Blvd"},
  {name:"The Monarch Tavern",hood:"Little Italy",type:"comedy",days:["thu"],start:20,end:22,detail:"Comedy night every Thursday. $10 includes a drink ticket.",addr:"12 Clinton St"},
  {name:"Comedy Bar",hood:"Kensington",type:"comedy",days:["thu","fri","sat"],start:20,end:23,detail:"Main stage shows Thurs–Sat. $15–20 tickets. Full bar.",addr:"945 Bloor St W"},
  {name:"The Drake Hotel",hood:"Queen West",type:"dj",days:["fri","sat"],start:22,end:26,detail:"Resident DJ sets in the Underground. No cover before 11pm.",addr:"1150 Queen St W"},
  {name:"Baro",hood:"King West",type:"dj",days:["fri","sat"],start:22,end:26,detail:"DJ nights on weekends. Latin & Afrobeats. $10 cover after 10pm.",addr:"485 King St W"},
  {name:"The Ossington",hood:"Ossington",type:"dj",days:["sat"],start:22,end:26,detail:"Local DJs every Saturday. No cover. Dancing in the back room.",addr:"61 Ossington Ave"},
  {name:"Sneaky Dee's",hood:"Kensington",type:"dj",days:["fri","sat"],start:22,end:26,detail:"Free DJ nights upstairs on weekends. Cheap drinks, great vibe.",addr:"431 College St"},
  {name:"The Ballroom",hood:"Financial",type:"bingo",days:["thu"],start:20,end:22,detail:"Music bingo Thursdays. Free to play. Prizes every round.",addr:"145 John St"},
  {name:"The Burdock",hood:"Kensington",type:"openmic",days:["sun"],start:19,end:22,detail:"Sunday songwriter circle. Intimate acoustic sets. Free.",addr:"1184 Bloor St W"},
];

const ALL = [...HH, ...EV];
const dayKeys = ["sun","mon","tue","wed","thu","fri","sat"];
const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const dayAbbr = {mon:"Mon",tue:"Tue",wed:"Wed",thu:"Thu",fri:"Fri",sat:"Sat",sun:"Sun"};
const typeLabel = {happyhour:"Happy hour",trivia:"Trivia",karaoke:"Karaoke",openmic:"Open mic",dj:"DJ night",comedy:"Comedy",bingo:"Bingo"};
const typeBadge = {happyhour:"badge-hh",trivia:"badge-trivia",karaoke:"badge-karaoke",openmic:"badge-openmic",dj:"badge-dj",comedy:"badge-comedy",bingo:"badge-bingo"};

const now = new Date();
const todayIdx = now.getDay();
const todayKey = dayKeys[todayIdx];
const currentHour = now.getHours() + now.getMinutes()/60;

document.getElementById("today-label").textContent = dayNames[todayIdx];
document.getElementById("day-select").value = todayKey;

let activeType = "all";
let activeNav  = "all";

function setType(el){
  document.querySelectorAll(".filter-pill").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  activeType = el.dataset.type;
  render();
}

function setNav(type, el){
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  activeNav = type;
  activeType = "all";
  document.querySelectorAll(".filter-pill").forEach(p=>p.classList.remove("active"));
  document.querySelector("[data-type='all']").classList.add("active");
  render();
}

function isNow(v){
  const day = document.getElementById("day-select").value;
  if(day !== todayKey) return false;
  return v.days.includes(todayKey) && currentHour >= v.start && currentHour < v.end;
}

function fmt(h){
  const h24 = h >= 24 ? h - 24 : h;
  const ap = h24 >= 12 ? "pm" : "am";
  const hr = h24 > 12 ? h24-12 : (h24===0?12:h24);
  return hr + ap;
}

function render(){
  const day     = document.getElementById("day-select").value;
  const hood    = document.getElementById("hood-select").value;
  const nowOnly = document.getElementById("now-only").checked;

  let items = ALL.filter(v => {
    if(!v.days.includes(day)) return false;
    if(hood !== "all" && v.hood !== hood) return false;
    if(activeNav === "happyhour" && v.type !== "happyhour") return false;
    if(activeNav === "event" && v.type === "happyhour") return false;
    if(activeType !== "all" && v.type !== activeType) return false;
    if(nowOnly && !isNow(v)) return false;
    return true;
  });

  items.sort((a,b) => isNow(b) - isNow(a));

  document.getElementById("count-text").textContent = items.length + " spot" + (items.length!==1?"s":"") + " tonight";

  const cards = document.getElementById("cards");
  if(!items.length){
    cards.innerHTML = `<div class="empty"><div class="empty-icon">◎</div><p>Nothing matches your filters.<br>Try a different day or neighbourhood.</p></div>`;
    return;
  }

  cards.innerHTML = items.map(v => {
    const live = isNow(v);
    return `<div class="card ${live?"now":""}">
      <div class="card-top">
        <div>
          <div class="card-name">${v.name}</div>
          <div class="card-hood">${v.hood} · ${v.addr}</div>
        </div>
        <span class="badge ${typeBadge[v.type]}">${typeLabel[v.type]}</span>
      </div>
      <div class="card-detail">${v.detail}</div>
      <div class="card-footer">
        <div class="time-info">
          <div class="dot ${live?"live":""}"></div>
          <span class="time-text ${live?"live":""}">${live ? "Happening now" : fmt(v.start)+"–"+fmt(v.end)}</span>
        </div>
        <span class="days-text">${v.days.map(d=>dayAbbr[d]).join(" · ")}</span>
      </div>
    </div>`;
  }).join("");
}

function dismissBanner(){
  document.getElementById("install-banner").style.display = "none";
  localStorage.setItem("banner-dismissed","1");
}

if(!localStorage.getItem("banner-dismissed") && /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)){
  setTimeout(()=>{ document.getElementById("install-banner").style.display="flex"; }, 1500);
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

render();
</script>
</body>
</html>
