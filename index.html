<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tonight.TO">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Tonight.TO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --bg:#080808;
  --surface:#111;
  --surface2:#1a1a1a;
  --surface3:#222;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#f5f0e8;
  --muted:#666;
  --muted2:#888;
  --accent:#ff4d1c;
  --accent2:#ff7c52;
  --accent-glow:rgba(255,77,28,0.2);
  --green:#3ecf8e;
  --green-dim:rgba(62,207,142,0.15);
  --radius:16px;
  --radius-sm:10px;
  --header-h:130px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;overflow-x:hidden}

/* NOISE OVERLAY */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:0.4;
}

/* VIEWS */
.view{display:none;flex-direction:column;height:100vh;overflow:hidden}
.view.active{display:flex}

/* STICKY HEADER */
.header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(180deg,var(--bg) 85%,transparent);
  padding:56px 20px 0;
  flex-shrink:0;
}
.header-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2px}
.logo{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:32px;
  letter-spacing:-0.02em;
  color:var(--text);
  line-height:1;
}
.logo .dot{color:var(--accent)}
.logo .to{color:var(--accent)}
.live-badge{
  display:flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--green);
  background:var(--green-dim);
  border:1px solid rgba(62,207,142,0.25);
  padding:4px 10px 4px 8px;border-radius:20px;
}
.live-badge::before{
  content:'';width:6px;height:6px;border-radius:50%;background:var(--green);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.subhead{font-size:11px;color:var(--muted2);margin-bottom:14px;letter-spacing:.02em}

/* TOP NAV TABS */
.tab-nav{
  display:flex;gap:0;padding:0 20px 12px;flex-shrink:0;
}
.tab-btn{
  flex:1;padding:9px 0;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  background:var(--surface2);border:none;color:var(--muted2);cursor:pointer;
  transition:all .2s;
}
.tab-btn:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.tab-btn:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.tab-btn.active{background:var(--accent);color:#fff}

/* TYPE PILLS */
.pills-wrap{padding:0 20px 10px;flex-shrink:0}
.pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.pills::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:600;
  border:1px solid var(--border2);
  background:transparent;color:var(--muted2);
  cursor:pointer;transition:all .15s;white-space:nowrap;
  font-family:'Instrument Sans',sans-serif;
}
.pill.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* CONTROLS ROW */
.controls{padding:0 20px 10px;display:flex;gap:8px;flex-shrink:0;align-items:center}
.sw{flex:1;position:relative}
.sw select{
  width:100%;appearance:none;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:9px 28px 9px 12px;
  border-radius:var(--radius-sm);font-size:13px;
  font-family:'Instrument Sans',sans-serif;cursor:pointer;
}
.sw::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px;pointer-events:none}
.locate-btn{
  flex-shrink:0;padding:9px 12px;
  border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface2);color:var(--muted2);
  font-size:12px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:5px;white-space:nowrap;
  font-family:'Instrument Sans',sans-serif;transition:all .2s;
}
.locate-btn.located{border-color:var(--green);color:var(--green)}

/* TIME SLIDER */
.time-control{padding:0 20px 10px;flex-shrink:0}
.time-row{display:flex;align-items:center;gap:10px}
.time-row label{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.time-row input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.time-display{font-size:13px;font-weight:700;color:var(--accent);min-width:48px;text-align:right;flex-shrink:0;font-family:'Syne',sans-serif}

/* COUNT BAR */
.count-bar{padding:4px 20px 10px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.count-text{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.now-lbl{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2);cursor:pointer;font-weight:600}
.now-lbl input{accent-color:var(--accent)}

/* CARDS */
.cards-scroll{flex:1;overflow-y:auto;padding:0 16px 40px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px 16px;
  transition:transform .1s,border-color .2s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--card-accent,var(--border2));
  border-radius:3px 0 0 3px;
}
.card:active{transform:scale(.98)}
.card.live-card{border-color:rgba(62,207,142,0.25);background:linear-gradient(135deg,var(--surface) 0%,rgba(62,207,142,0.04) 100%)}
.card.live-card::before{background:var(--green)}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.card-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);line-height:1.2;letter-spacing:-.01em}
.card-sub{font-size:11px;color:var(--muted2);margin-top:3px}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;letter-spacing:.05em;text-transform:uppercase}
.b-hh{background:rgba(255,77,28,.15);color:#ff7c52}
.b-trivia{background:rgba(82,160,255,.12);color:#7ab4ff}
.b-karaoke{background:rgba(255,80,160,.12);color:#ff80c0}
.b-openmic{background:rgba(62,207,142,.12);color:#3ecf8e}
.b-dj{background:rgba(180,80,255,.12);color:#cc80ff}
.b-comedy{background:rgba(255,180,40,.12);color:#ffcc40}
.b-bingo{background:rgba(40,210,255,.12);color:#40d4ff}
.b-jazz{background:rgba(255,210,80,.12);color:#ffd040}
.b-livemusic{background:rgba(150,255,100,.12);color:#90ee60}
.b-drag{background:rgba(255,100,200,.12);color:#ff80d0}

.detail{font-size:13px;color:#999;line-height:1.5;margin-bottom:10px}
.card-ftr{display:flex;justify-content:space-between;align-items:center}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted);margin-right:5px;vertical-align:middle}
.dot.on{background:var(--green);box-shadow:0 0 6px rgba(62,207,142,.6)}
.time-wrap{display:flex;align-items:center;font-size:12px}
.time-txt{color:var(--muted2)}
.time-txt.on{color:var(--green);font-weight:600}
.days-txt{font-size:11px;color:var(--muted)}
.card-gmaps{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:10px;padding:7px 12px;
  background:transparent;border:1px solid var(--border2);
  border-radius:var(--radius-sm);font-size:12px;font-weight:600;
  color:var(--muted2);cursor:pointer;text-decoration:none;
  transition:all .15s;font-family:'Instrument Sans',sans-serif;
}
.card-gmaps:active{background:var(--surface3)}
.dist-badge{font-size:11px;color:var(--muted)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.7;color:var(--muted2)}

/* MAP VIEW */
#map-view{position:relative}
#map{flex:1;width:100%;background:#111}
.map-header{padding:56px 20px 10px;flex-shrink:0}
.map-filters{padding:0 20px 10px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.map-filters::-webkit-scrollbar{display:none}

/* BOTTOM SHEET */
.sheet-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity .3s;z-index:400;
}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--surface);
  border-radius:24px 24px 0 0;
  border-top:1px solid var(--border2);
  padding:16px 20px 40px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
  z-index:401;
}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.sheet-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.01em}
.sheet-addr{font-size:12px;color:var(--muted2);margin:4px 0 10px}
.sheet-detail{font-size:14px;color:#aaa;line-height:1.6;margin-bottom:12px}
.sheet-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.gmaps-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px;border-radius:var(--radius-sm);
  background:var(--accent);color:#fff;font-family:'Syne',sans-serif;
  font-size:14px;font-weight:700;letter-spacing:.02em;text-decoration:none;
  cursor:pointer;transition:opacity .15s;
}
.gmaps-btn:active{opacity:.85}

/* BOTTOM NAV */
.nav{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;background:rgba(8,8,8,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:8px 0 max(env(safe-area-inset-bottom),12px);
  z-index:200;
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:4px 0;background:none;border:none;cursor:pointer;
  color:var(--muted);transition:color .15s;
  font-family:'Instrument Sans',sans-serif;
}
.nb svg{transition:transform .15s}
.nb.active{color:var(--accent)}
.nb.active svg{transform:scale(1.1)}
.nb-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}

/* MAP DARK TILES OVERRIDE */
.leaflet-tile{filter:invert(1) hue-rotate(180deg) brightness(0.85) contrast(0.9) saturate(0.8)}
.leaflet-container{background:#111}
.leaflet-control-zoom a{background:var(--surface2)!important;color:var(--text)!important;border-color:var(--border)!important}

/* SECTION DIVIDER */
.section-label{
  padding:12px 20px 6px;
  font-size:10px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);flex-shrink:0;
}
</style>
</head>
<body>

  {name:"Lula Lounge (Live)",hood:"Little Portugal",type:"livemusic",days:["fri","sat"],start:20,end:24,detail:"Latin jazz, salsa, Cuban bands. Free salsa lessons before the show. Beloved institution.",addr:"1585 Dundas St W",lat:43.6519,lng:-79.4476},
  {name:"The Garrison",hood:"Kensington",type:"livemusic",days:["fri","sat"],start:20,end:24,detail:"Indie/punk/experimental live music. Intimate 300-cap room. Local heroes.",addr:"1197 Dundas St W",lat:43.6519,lng:-79.4387},

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const ALL=[...HH,...EV];
const DKEYS=["sun","mon","tue","wed","thu","fri","sat"];
const DNAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DABB={mon:"Mon",tue:"Tue",wed:"Wed",thu:"Thu",fri:"Fri",sat:"Sat",sun:"Sun"};
const TLABEL={happyhour:"Happy Hour",trivia:"Trivia",karaoke:"Karaoke",openmic:"Open Mic",dj:"DJ Night",comedy:"Comedy",bingo:"Bingo",livemusic:"Live Music",jazz:"Jazz",drag:"Drag"};
const TBADGE={happyhour:"b-hh",trivia:"b-trivia",karaoke:"b-karaoke",openmic:"b-openmic",dj:"b-dj",comedy:"b-comedy",bingo:"b-bingo",livemusic:"b-livemusic",jazz:"b-jazz",drag:"b-drag"};
const TYPE_COLOR={happyhour:"#ff7c52",trivia:"#7ab4ff",karaoke:"#ff80c0",openmic:"#3ecf8e",dj:"#cc80ff",comedy:"#ffcc40",bingo:"#40d4ff",livemusic:"#90ee60",jazz:"#ffd040",drag:"#ff80d0"};
const TYPE_ACCENTVAR={happyhour:"#ff4d1c",trivia:"#5294ff",karaoke:"#ff4d99",openmic:"#2dc27a",dj:"#b24dff",comedy:"#f0b800",bingo:"#00c4f8",livemusic:"#6ade30",jazz:"#f0c000",drag:"#ff4dc0"};

const nowDate=new Date();
const todayIdx=nowDate.getDay();
const todayKey=DKEYS[todayIdx];
const curHour=nowDate.getHours()+nowDate.getMinutes()/60;

document.getElementById("day-sel").value=todayKey;
document.getElementById("map-day-sel").value=todayKey;

let activeTab="all", activeType="all", mapActiveTypes=new Set();
let userLat=null, userLng=null;

// ─── GEO UTILS ───────────────────────────────────────────────────────────────
function deg2rad(d){return d*Math.PI/180}
function haversine(la1,lo1,la2,lo2){
  const R=6371,dLa=deg2rad(la2-la1),dLo=deg2rad(lo2-lo1);
  const a=Math.sin(dLa/2)**2+Math.cos(deg2rad(la1))*Math.cos(deg2rad(la2))*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function distKm(v){if(!userLat||!v.lat)return Infinity;return haversine(userLat,userLng,v.lat,v.lng)}
function distLabel(v){const d=distKm(v);if(d===Infinity)return "";return d<1?(Math.round(d*1000)+"m"):(d.toFixed(1)+"km")}

function getLocation(){
  const btn=document.getElementById("locate-btn");
  if(!navigator.geolocation){btn.textContent="Not supported";return}
  btn.textContent="Locating…";
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;userLng=pos.coords.longitude;
    btn.classList.add("located");
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg> Located';
    render();
  },()=>{btn.textContent="Denied"},{ enableHighAccuracy:false,timeout:8000,maximumAge:300000 });
}

function getTimeFilter(){
  const v=parseFloat(document.getElementById("time-slider").value);
  return v===0?null:v;
}
function updateTimeDisplay(){
  const v=parseFloat(document.getElementById("time-slider").value);
  const el=document.getElementById("time-display");
  if(v===0){el.textContent="Any";return}
  const h=Math.floor(v%24),m=v%1===0.5?"30":"00",ap=h>=12?"pm":"am",hr=h>12?h-12:(h===0?12:h);
  el.textContent=hr+":"+m+ap;
}

// ─── VIEWS ────────────────────────────────────────────────────────────────────
let currentView="list",leafletMap=null,mapMarkers=[];

function showView(v,el){
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".nb").forEach(x=>x.classList.remove("active"));
  if(el)el.classList.add("active");
  currentView=v;
  if(v==="list"){
    document.getElementById("list-view").classList.add("active");
    document.getElementById("nb-list").classList.add("active");
  } else {
    document.getElementById("map-view").classList.add("active");
    document.getElementById("nb-map").classList.add("active");
    setTimeout(initMap,100);
  }
}

// ─── TABS + FILTERS ──────────────────────────────────────────────────────────
function setTab(t,el){
  activeTab=t;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  // Reset type filter to all
  activeType="all";
  document.querySelectorAll("#type-pills .pill").forEach(p=>p.classList.remove("active"));
  document.querySelector('#type-pills [data-t="all"]').classList.add("active");
  render();
}

function setType(el){
  document.querySelectorAll("#type-pills .pill").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  activeType=el.dataset.t;
  render();
}

function setMapType(el){
  const t=el.dataset.t;
  if(t==="all"){
    mapActiveTypes.clear();
    document.querySelectorAll("#map-type-pills .pill").forEach(p=>p.classList.remove("active"));
    el.classList.add("active");
  } else {
    document.querySelector("#map-type-pills [data-t='all']").classList.remove("active");
    if(mapActiveTypes.has(t)){mapActiveTypes.delete(t);el.classList.remove("active");if(mapActiveTypes.size===0){document.querySelector("#map-type-pills [data-t='all']").classList.add("active");}}
    else{mapActiveTypes.add(t);el.classList.add("active");}
  }
  renderMap();
}

function isNow(v){return v.days.includes(todayKey)&&curHour>=v.start&&curHour<v.end}
function fmt(h){const h2=h>=24?h-24:h;const ap=h2>=12?"pm":"am";const hr=h2>12?h2-12:(h2===0?12:h2);const m=h2%1===0.5?":30":"";return hr+m+ap}

function getFiltered(tFilter){
  const day=document.getElementById("day-sel").value||todayKey;
  const hood=document.getElementById("hood-sel").value||"all";
  const nowOnly=document.getElementById("now-chk").checked||false;
  const timeFilter=getTimeFilter();
  return ALL.filter(v=>{
    if(!v.days.includes(day))return false;
    if(hood!=="all"&&v.hood!==hood)return false;
    if(tFilter!=="all"&&v.type!==tFilter)return false;
    // Tab filter
    if(activeTab==="happyhour"&&v.type!=="happyhour")return false;
    if(activeTab==="events"&&v.type==="happyhour")return false;
    if(nowOnly&&!isNow(v))return false;
    if(timeFilter!==null&&!(v.start<=timeFilter&&v.end>timeFilter))return false;
    return true;
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  let items=getFiltered(activeType);
  if(userLat){
    items.sort((a,b)=>{const ld=isNow(b)-isNow(a);if(ld!==0)return ld;return distKm(a)-distKm(b);});
  } else {
    items.sort((a,b)=>isNow(b)-isNow(a));
  }
  const liveCount=items.filter(isNow).length;
  document.getElementById("live-count-badge").textContent=liveCount>0?`${liveCount} live now`:"Tonight";
  const day=document.getElementById("day-sel").value;
  const dayName=DNAMES[DKEYS.indexOf(day)];
  document.getElementById("subhead-day").textContent=`${items.length} spot${items.length!==1?"s":""} · ${dayName} · Toronto`;
  document.getElementById("ct").textContent=`${items.length} spot${items.length!==1?"s":""} found`;
  const c=document.getElementById("cards");
  if(!items.length){
    c.innerHTML=`<div class="empty"><div class="empty-icon">🌙</div><p>Nothing matches right now.<br>Try a different day or neighbourhood.</p></div>`;
    return;
  }
  c.innerHTML=items.map(v=>{
    const live=isNow(v);
    const gmapsUrl="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(v.name+", "+v.addr+", Toronto, ON");
    const accentColor=TYPE_ACCENTVAR[v.type]||"#ff4d1c";
    return`<div class="card ${live?"live-card":""}" style="--card-accent:${accentColor}">
      <div class="card-top">
        <div>
          <div class="card-name">${v.name}</div>
          <div class="card-sub">${v.hood} · ${v.addr}${userLat?` <span class="dist-badge">· ${distLabel(v)}</span>`:""}</div>
        </div>
        <span class="badge ${TBADGE[v.type]||"b-hh"}">${TLABEL[v.type]||v.type}</span>
      </div>
      <div class="detail">${v.detail}</div>
      <div class="card-ftr">
        <div class="time-wrap"><span class="dot ${live?"on":""}"></span><span class="time-txt ${live?"on":""}">${live?"Happening now":fmt(v.start)+"–"+fmt(v.end)}</span></div>
        <span class="days-txt">${v.days.map(d=>DABB[d]).join(" · ")}</span>
      </div>
      <a class="card-gmaps" href="${gmapsUrl}" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        View on Google Maps
      </a>
    </div>`;
  }).join("");
}

// ─── MAP ─────────────────────────────────────────────────────────────────────
function initMap(){
  if(leafletMap){renderMap();return}
  leafletMap=L.map("map",{center:[43.655,-79.395],zoom:13,zoomControl:true});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
    attribution:'&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains:"abcd",maxZoom:19
  }).addTo(leafletMap);
  renderMap();
}

function renderMap(){
  if(!leafletMap)return;
  mapMarkers.forEach(m=>leafletMap.removeLayer(m));
  mapMarkers=[];
  const day=document.getElementById("map-day-sel")?.value||todayKey;
  const items=ALL.filter(v=>{
    if(!v.days.includes(day))return false;
    if(mapActiveTypes.size>0&&!mapActiveTypes.has(v.type))return false;
    return true;
  });
  items.forEach(v=>{
    const live=isNow(v);
    const color=TYPE_COLOR[v.type]||"#ff7c52";
    const size=live?16:10;
    const icon=L.divIcon({
      className:"",
      html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid ${live?"#fff":"rgba(255,255,255,0.3)"};box-shadow:${live?"0 0 10px "+color+",0 0 4px rgba(0,0,0,0.5)":"0 1px 4px rgba(0,0,0,0.4)"};transition:all .2s"></div>`,
      iconSize:[size,size],iconAnchor:[size/2,size/2]
    });
    const m=L.marker([v.lat,v.lng],{icon}).addTo(leafletMap);
    m.on("click",()=>openSheet(v));
    mapMarkers.push(m);
  });
}

function openSheet(v){
  const live=isNow(v);
  const gmapsUrl="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(v.name+", "+v.addr+", Toronto, ON");
  document.getElementById("sheet-content").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;padding-right:30px">
      <div class="sheet-name">${v.name}</div>
      <span class="badge ${TBADGE[v.type]||"b-hh"}" style="margin-top:3px">${TLABEL[v.type]||v.type}</span>
    </div>
    <div class="sheet-addr">${v.hood} · ${v.addr}</div>
    <div class="sheet-detail">${v.detail}</div>
    <div class="sheet-row">
      <div class="time-wrap"><span class="dot ${live?"on":""}"></span><span class="time-txt ${live?"on":""}">${live?"Happening now":fmt(v.start)+"–"+fmt(v.end)}</span></div>
      <span class="days-txt">${v.days.map(d=>DABB[d]).join(" · ")}</span>
    </div>
    <a class="gmaps-btn" href="${gmapsUrl}" target="_blank" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      Open in Google Maps
    </a>`;
  document.getElementById("sheet").classList.add("open");
  document.getElementById("sheet-overlay").classList.add("open");
}

function closeSheet(){
  document.getElementById("sheet").classList.remove("open");
  document.getElementById("sheet-overlay").classList.remove("open");
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById("day-sel").value=todayKey;
document.getElementById("map-day-sel").value=todayKey;

if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{})}

if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;userLng=pos.coords.longitude;
    const btn=document.getElementById("locate-btn");
    btn.classList.add("located");
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg> Located';
    render();
  },()=>{render()},{enableHighAccuracy:false,timeout:8000,maximumAge:300000});
} else {render();}
</script>
