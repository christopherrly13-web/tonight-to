<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tonight TO">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:rgba(255,255,255,0.08);--text:#f0ede8;--muted:#888;--accent:#e8c547;--accent-dim:rgba(232,197,71,0.12);--green:#4caf7d;--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* VIEWS */
.view{display:none;flex-direction:column;height:100vh;overflow:hidden}
.view.active{display:flex}

/* HEADER */
.header{padding:70px 20px 0;flex-shrink:0}
.header-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4px}
.logo{font-family:'DM Serif Display',serif;font-size:28px;color:var(--text);line-height:1}
.logo span{color:var(--accent)}
.tonight-badge{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:var(--accent-dim);color:var(--accent);padding:4px 10px;border-radius:20px;border:1px solid rgba(232,197,71,.2)}
.subhead{font-size:12px;color:var(--muted);margin-bottom:12px}

/* FILTERS */
.filters{padding:0 20px 10px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.filters::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill.active{background:var(--accent);color:#0f0f0f;border-color:var(--accent)}

/* CONTROLS */
.controls{padding:0 20px 10px;display:flex;gap:8px;flex-shrink:0}
.sw{flex:1;position:relative}
.sw select{width:100%;appearance:none;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 28px 8px 11px;border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.sw::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px;pointer-events:none}

/* COUNT BAR */
.count-bar{padding:0 20px 8px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.count-text{font-size:12px;color:var(--muted)}
.now-lbl{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer}
.now-lbl input{accent-color:var(--accent)}

/* CARDS */
.cards-scroll{flex:1;overflow-y:auto;padding:0 20px 40px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;transition:transform .1s}
.card:active{transform:scale(.98)}
.card.live-card{border-color:rgba(76,175,125,.35)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:7px}
.card-name{font-size:15px;font-weight:600;color:var(--text);line-height:1.25}
.card-sub{font-size:11px;color:var(--muted);margin-top:3px}
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.b-hh{background:rgba(232,197,71,.15);color:#c9a832}
.b-trivia{background:rgba(100,160,255,.12);color:#7aabff}
.b-karaoke{background:rgba(240,100,160,.12);color:#f07ab8}
.b-openmic{background:rgba(100,220,160,.12);color:#5dd4a0}
.b-dj{background:rgba(180,100,255,.12);color:#c07aff}
.b-comedy{background:rgba(255,160,80,.12);color:#ffaa60}
.b-bingo{background:rgba(80,200,240,.12);color:#60d4f8}
.b-jazz{background:rgba(255,200,100,.12);color:#ffc864}
.b-livemusic{background:rgba(180,255,140,.12);color:#a0e870}
.b-drag{background:rgba(255,130,200,.12);color:#ff82c8}
.detail{font-size:13px;color:#aaa;line-height:1.5;margin-bottom:11px}
.card-ftr{display:flex;justify-content:space-between;align-items:center}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted);margin-right:5px;vertical-align:middle}
.dot.on{background:var(--green);box-shadow:0 0 5px rgba(76,175,125,.5)}
.time-wrap{display:flex;align-items:center;font-size:12px}
.time-txt{color:var(--muted)}
.time-txt.on{color:var(--green);font-weight:500}
.days-txt{font-size:11px;color:var(--muted)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty p{font-size:14px;line-height:1.6}
.card-gmaps{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:7px 12px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-weight:500;color:var(--muted);font-family:"DM Sans",sans-serif;cursor:pointer;text-decoration:none;transition:all .15s}
.card-gmaps:active{background:var(--surface2)}
.time-control{padding:0 20px 10px;flex-shrink:0}
.time-row{display:flex;align-items:center;gap:10px}
.time-row label{font-size:12px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.time-row input[type=range]{flex:1;accent-color:var(--accent)}
.time-display{font-size:13px;font-weight:500;color:var(--accent);min-width:48px;text-align:right;flex-shrink:0}
.locate-btn{flex-shrink:0;padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;font-family:"DM Sans",sans-serif;transition:all .15s}
.locate-btn.located{border-color:var(--green);color:var(--green)}
.locate-btn:active{background:var(--surface2)}
.dist-badge{font-size:11px;color:var(--muted);margin-left:4px}

/* MAP VIEW */
#map-view{position:relative}
#map{flex:1;width:100%;background:#1a1a1a}
.map-header{padding:70px 20px 10px;flex-shrink:0}
.map-filters{padding:0 20px 10px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.map-filters::-webkit-scrollbar{display:none}

/* MAP BOTTOM SHEET */
.sheet{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;border-top:1px solid #e0e0e0;transform:translateY(100%);transition:transform .3s ease;z-index:1000;max-height:60vh;overflow:hidden;display:flex;flex-direction:column}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0}
.sheet-content{overflow-y:auto;padding:12px 16px 20px;-webkit-overflow-scrolling:touch}
.sheet-name{font-size:17px;font-weight:600;color:#111;margin-bottom:3px}
.sheet-addr{font-size:12px;color:#888;margin-bottom:10px}
.sheet-detail{font-size:13px;color:#555;line-height:1.5;margin-bottom:10px}
.sheet-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sheet-close{position:absolute;right:16px;top:16px;background:#f0f0f0;border:none;color:#666;font-size:16px;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gmaps-btn{display:flex;align-items:center;gap:6px;background:#1a73e8;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:500;font-family:"DM Sans",sans-serif;cursor:pointer;width:100%;justify-content:center;text-decoration:none}
.gmaps-btn:active{opacity:.85}

/* Leaflet dark overrides */
.leaflet-container{background:#f5f5f0!important}
.leaflet-popup-content-wrapper{background:#fff;color:#111;border:1px solid #ddd;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.12);font-family:'DM Sans',sans-serif}
.leaflet-popup-tip{background:#fff}
.leaflet-popup-content{margin:10px 14px;font-size:13px;line-height:1.5}
.leaflet-popup-content b{color:#111;font-weight:600}
.leaflet-popup-content small{color:#888}
.leaflet-bar a{background:#fff!important;color:#333!important;border-color:#ccc!important}
.leaflet-bar a:hover{background:#f5f5f0!important}

/* TOP NAV */
.bnav{position:fixed;top:0;left:0;right:0;background:rgba(15,15,15,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;padding:max(10px,env(safe-area-inset-top)) 12px 10px;z-index:2000;gap:8px}
.nb{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 4px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .15s;border-radius:var(--radius-sm);border:1px solid transparent}
.nb.active{color:#0f0f0f;background:var(--accent);border-color:var(--accent)}
.ni{font-size:14px;line-height:1}
</style>
</head>
<body>

<!-- LIST VIEW -->
<div class="view active" id="list-view">
  <div class="header">
    <div class="header-top">
      <div class="logo">Tonight<span>.</span>TO</div>
      <div class="tonight-badge" id="today-lbl">Thursday</div>

        Near me
      </button>
    </div>
  </div>
  <div class="count-bar">
    <span class="count-text" id="ct"></span>
    <label class="now-lbl"><input type="checkbox" id="now-chk" onchange="render()"> Now only</label>
  </div>
  <div class="cards-scroll" id="cards"></div>
</div>

<!-- MAP VIEW -->
<div class="view" id="map-view">
  <div class="map-header">
    <div class="header-top">
      <div class="logo">Tonight<span>.</span>TO</div>
      <div class="tonight-badge" id="map-today-lbl">Thursday</div>
    </div>
  </div>
  <div class="map-filters" id="map-type-pills">
    <div class="pill active" data-t="all" onclick="setMapType(this)">All</div>

    <div class="pill" data-t="trivia" onclick="setMapType(this)">Trivia</div>
    <div class="pill" data-t="karaoke" onclick="setMapType(this)">Karaoke</div>
    <div class="pill" data-t="openmic" onclick="setMapType(this)">Open mic</div>
    <div class="pill" data-t="comedy" onclick="setMapType(this)">Comedy</div>
    <div class="pill" data-t="livemusic" onclick="setMapType(this)">Live music</div>
    <div class="pill" data-t="dj" onclick="setMapType(this)">DJ</div>
    <div class="pill" data-t="jazz" onclick="setMapType(this)">Jazz</div>
  </div>
  <div id="map"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
    <div class="sheet-content" id="sheet-content"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <button class="nb active" id="nb-list" onclick="showView('list',this)"><span class="ni">☰</span>List</button>
  <button class="nb" id="nb-map" onclick="showView('map',this)"><span class="ni">◎</span>Map</button>

</div>

const ALL=[...HH,...EV];
const DKEYS=["sun","mon","tue","wed","thu","fri","sat"];
const DNAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DABB={mon:"Mon",tue:"Tue",wed:"Wed",thu:"Thu",fri:"Fri",sat:"Sat",sun:"Sun"};
const TLABEL={happyhour:"Happy hour",trivia:"Trivia",karaoke:"Karaoke",openmic:"Open mic",dj:"DJ night",comedy:"Comedy",bingo:"Bingo",livemusic:"Live music",jazz:"Jazz",drag:"Drag"};
const TBADGE={happyhour:"b-hh",trivia:"b-trivia",karaoke:"b-karaoke",openmic:"b-openmic",dj:"b-dj",comedy:"b-comedy",bingo:"b-bingo",livemusic:"b-livemusic",jazz:"b-jazz",drag:"b-drag"};
const TYPE_COLOR={happyhour:"#e8c547",trivia:"#7aabff",karaoke:"#f07ab8",openmic:"#5dd4a0",dj:"#c07aff",comedy:"#ffaa60",bingo:"#60d4f8",livemusic:"#a0e870",jazz:"#ffc864",drag:"#ff82c8"};

const nowDate=new Date();
const todayIdx=nowDate.getDay();
const todayKey=DKEYS[todayIdx];
const curHour=nowDate.getHours()+nowDate.getMinutes()/60;

document.getElementById("today-lbl").textContent=DNAMES[todayIdx];
document.getElementById("map-today-lbl").textContent=DNAMES[todayIdx];
document.getElementById("day-sel").value=todayKey;

let activeType="all", mapActiveTypes=new Set();
let userLat=null, userLng=null;

function deg2rad(d){return d*Math.PI/180;}
function haversine(lat1,lng1,lat2,lng2){
  const R=6371;
  const dLat=deg2rad(lat2-lat1), dLng=deg2rad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function distKm(v){
  if(!userLat||!v.lat)return Infinity;
  return haversine(userLat,userLng,v.lat,v.lng);
}
function distLabel(v){
  const d=distKm(v);
  if(d===Infinity)return "";
  return d<1?(Math.round(d*1000)+"m"):(d.toFixed(1)+"km");
}
function getLocation(){
  const btn=document.getElementById("locate-btn");
  if(!navigator.geolocation){btn.textContent="Not supported";return;}
  btn.textContent="Locating...";
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    btn.classList.add("located");
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg> Located';
    render();
  },()=>{btn.textContent="Location denied";});
}
function getTimeFilter(){
  const val=parseFloat(document.getElementById("time-slider").value);
  return val===0?null:val;
}
function updateTimeDisplay(){
  const val=parseFloat(document.getElementById("time-slider").value);
  const el=document.getElementById("time-display");
  if(val===0){el.textContent="Any";return;}
  const h=Math.floor(val);
  const m=val%1===0.5?"30":"00";
  const ap=h>=12?"pm":"am";
  const hr=h>12?h-12:(h===0?12:h);
  el.textContent=hr+":"+m+ap;
}
let currentView="list";
let leafletMap=null, mapMarkers=[];

function showView(v, el){
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".nb").forEach(x=>x.classList.remove("active"));
  if(el) el.classList.add("active");
  currentView=v;
  if(v==="list"){
    document.getElementById("list-view").classList.add("active");
    document.getElementById("nb-list").classList.add("active");
  } else {
    document.getElementById("map-view").classList.add("active");
    document.getElementById("nb-map").classList.add("active");
    setTimeout(initMap, 100);
  }
}

function setNavFilter(t){
  activeType=t==="event"?"all":"happyhour";
  document.querySelectorAll("#type-pills .pill").forEach(p=>p.classList.remove("active"));
  const target=document.querySelector(`#type-pills [data-t="${t==="event"?"all":t}"]`);
  if(target)target.classList.add("active");
  render();
}

function setType(el){
  document.querySelectorAll("#type-pills .pill").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  activeType=el.dataset.t;
  render();
}

function setMapType(el){
  const t=el.dataset.t;
  if(t==="all"){
    // All clears everything and selects all
    mapActiveTypes.clear();
    document.querySelectorAll("#map-type-pills .pill").forEach(p=>p.classList.remove("active"));
    el.classList.add("active");
  } else {
    // Deselect "All" if it was active
    const allPill=document.querySelector("#map-type-pills [data-t='all']");
    allPill.classList.remove("active");
    // Toggle this type
    if(mapActiveTypes.has(t)){
      mapActiveTypes.delete(t);
      el.classList.remove("active");
      // If nothing selected, revert to All
      if(mapActiveTypes.size===0){
        allPill.classList.add("active");
      }
    } else {
      mapActiveTypes.add(t);
      el.classList.add("active");
    }
  }
  renderMap();
}

function isNow(v){
  return v.days.includes(todayKey)&&curHour>=v.start&&curHour<v.end;
}
function fmt(h){const h2=h>=24?h-24:h;const ap=h2>=12?"pm":"am";const hr=h2>12?h2-12:(h2===0?12:h2);return hr+ap;}

function getFiltered(typeFilter){
  const day=document.getElementById("day-sel")?.value||todayKey;
  const hood=document.getElementById("hood-sel")?.value||"all";
  const nowOnly=document.getElementById("now-chk")?.checked||false;
  const timeFilter=getTimeFilter();
  return ALL.filter(v=>{
    if(!v.days.includes(day))return false;
    if(hood!=="all"&&v.hood!==hood)return false;
    if(typeFilter!=="all"&&v.type!==typeFilter)return false;
    if(nowOnly&&!isNow(v))return false;
    if(timeFilter!==null&&!(v.start<=timeFilter&&v.end>timeFilter))return false;
    return true;
  });
}

function render(){
  let items=getFiltered(activeType);
  // Sort: live-first, then by distance if location known, else default order
  if(userLat){
    items.sort((a,b)=>{
      const ld=isNow(b)-isNow(a);
      if(ld!==0)return ld;
      return distKm(a)-distKm(b);
    });
  } else {
    items.sort((a,b)=>isNow(b)-isNow(a));
  }
  const day=document.getElementById("day-sel").value;
  document.getElementById("ct").textContent=items.length+" spot"+(items.length!==1?"s":"")+" found";
  document.getElementById("count-sub").textContent=items.length+" spot"+(items.length!==1?"s":"")+" · "+DNAMES[DKEYS.indexOf(day)];
  const c=document.getElementById("cards");
  if(!items.length){c.innerHTML=`<div class="empty"><p>Nothing matches your filters.<br>Try a different day or neighbourhood.</p></div>`;return;}
  c.innerHTML=items.map(v=>{
    const live=isNow(v);
    const gmapsQuery=encodeURIComponent(v.name+", "+v.addr+", Toronto, ON");
    const gmapsUrl="https://www.google.com/maps/search/?api=1&query="+gmapsQuery;
    return`<div class="card ${live?"live-card":""}">
      <div class="card-top">
        <div><div class="card-name">${v.name}</div><div class="card-sub">${v.hood} · ${v.addr}${userLat?` <span class="dist-badge">· ${distLabel(v)}</span>`:""}</div></div>
        <span class="badge ${TBADGE[v.type]||"b-hh"}">${TLABEL[v.type]||v.type}</span>
      </div>
      <div class="detail">${v.detail}</div>
      <div class="card-ftr">
        <div class="time-wrap"><span class="dot ${live?"on":""}"></span><span class="time-txt ${live?"on":""}">${live?"Happening now":fmt(v.start)+"–"+fmt(v.end)}</span></div>
        <span class="days-txt">${v.days.map(d=>DABB[d]).join(" · ")}</span>
      </div>
      <a class="card-gmaps" href="${gmapsUrl}" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        View on Google Maps
      </a>
    </div>`;
  }).join("");
}

function initMap(){
  if(leafletMap) { renderMap(); return; }
  leafletMap=L.map("map",{center:[43.655,-79.385],zoom:13,zoomControl:true});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
    attribution:'&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains:"abcd", maxZoom:19
  }).addTo(leafletMap);
  renderMap();
}

function renderMap(){
  if(!leafletMap) return;
  mapMarkers.forEach(m=>leafletMap.removeLayer(m));
  mapMarkers=[];
  const day=document.getElementById("day-sel")?.value||todayKey;
  const items=ALL.filter(v=>{
    if(!v.days.includes(day))return false;
    if(mapActiveTypes.size>0&&!mapActiveTypes.has(v.type))return false;
    return true;
  });
  items.forEach(v=>{
    const live=isNow(v);
    const color=TYPE_COLOR[v.type]||"#e8c547";
    const size=live?14:10;
    const icon=L.divIcon({
      className:"",
      html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid ${live?"#fff":"rgba(255,255,255,0.4)"};box-shadow:${live?"0 0 8px "+color:"none"};"></div>`,
      iconSize:[size,size],
      iconAnchor:[size/2,size/2]
    });
    const m=L.marker([v.lat,v.lng],{icon}).addTo(leafletMap);
    m.on("click",()=>openSheet(v));
    mapMarkers.push(m);
  });
}

function openSheet(v){
  const live=isNow(v);
  const gmapsQuery=encodeURIComponent(v.name+", "+v.addr+", Toronto, ON");
  const gmapsUrl="https://www.google.com/maps/search/?api=1&query="+gmapsQuery;
  document.getElementById("sheet-content").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;padding-right:30px">
      <div class="sheet-name">${v.name}</div>
      <span class="badge ${TBADGE[v.type]||"b-hh"}" style="margin-top:2px">${TLABEL[v.type]||v.type}</span>
    </div>
    <div class="sheet-addr">${v.hood} · ${v.addr}</div>
    <div class="sheet-detail">${v.detail}</div>
    <div class="sheet-row">
      <div class="time-wrap"><span class="dot ${live?"on":""}"></span><span class="time-txt ${live?"on":""}">${live?"Happening now":fmt(v.start)+"–"+fmt(v.end)}</span></div>
      <span class="days-txt">${v.days.map(d=>DABB[d]).join(" · ")}</span>
    </div>
    <a class="gmaps-btn" href="${gmapsUrl}" target="_blank" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      View on Google Maps
    </a>`;
  document.getElementById("sheet").classList.add("open");
}

function closeSheet(){
  document.getElementById("sheet").classList.remove("open");
}

document.getElementById("day-sel").value=todayKey;
render();

if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
</body>
</html>
